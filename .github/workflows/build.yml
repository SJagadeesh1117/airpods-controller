name: Build & Release APK

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Post error as commit comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          with open('/tmp/build.log') as f:
              lines = f.readlines()

          errors = [l.rstrip() for l in lines if any(x in l for x in
              ['FAILURE', 'error:', 'Caused by:', 'what went wrong', 'Could not', '> Task'])][:50]
          last30 = [l.rstrip() for l in lines[-30:]]

          body = (
              "## Build Error\n```\n" + "\n".join(errors) +
              "\n```\n### Last 30 lines\n```\n" + "\n".join(last30) + "\n```"
          )

          data = json.dumps({"body": body[:65000]}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/commits/{os.environ['SHA']}/comments",
              data=data,
              headers={
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              print("Comment posted:", r.status)
          PYEOF

      - name: Rename APK for release
        if: success()
        run: |
          echo "=== Searching for APK ==="
          find app/build -name "*.apk" -type f || echo "No APKs found anywhere in app/build"
          APK=$(find app/build -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "Copying: $APK"
          cp "$APK" AirPodsController-debug.apk
          ls -lh AirPodsController-debug.apk

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: AirPods Controller v1.0.0-${{ github.run_number }}
          body: |
            ## AirPods Pro 2 Controller

            Build from commit ${{ github.sha }}

            ### Features
            - Battery status (L/R/Case) via BLE advertisement parsing
            - Ear detection — pause audio when buds removed
            - Auto-disconnect Bluetooth when both buds taken out
            - ANC control (Off / Noise Cancel / Transparency / Adaptive)
            - Find My Buds — last known GPS location + alarm sound
            - Gesture customization (Play/Pause, Next, Prev, ANC cycle, Volume)

            ### Install
            Download `AirPodsController-debug.apk`, enable **Install from unknown sources** in Android Settings, then install.
          files: AirPodsController-debug.apk
          fail_on_unmatched_files: true
