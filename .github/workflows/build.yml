name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Post error as commit comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          with open('/tmp/build.log') as f:
              lines = f.readlines()

          errors = [l.rstrip() for l in lines if any(x in l for x in
              ['FAILURE', 'error:', 'Caused by:', 'what went wrong', 'Could not', '> Task'])][:50]
          last30 = [l.rstrip() for l in lines[-30:]]

          body = (
              "## Build Error\n```\n" + "\n".join(errors) +
              "\n```\n### Last 30 lines\n```\n" + "\n".join(last30) + "\n```"
          )

          data = json.dumps({"body": body[:65000]}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/commits/{os.environ['SHA']}/comments",
              data=data,
              headers={
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              print("Comment posted:", r.status)
          PYEOF

      - name: Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v1.0.0-$(date +'%Y%m%d%H%M%S')"
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          NOTES="## AirPods Pro 2 Controller\n\nBuild from commit ${{ github.sha }}\n\n### Features\n- Battery status via BLE\n- Ear detection + auto-pause\n- Auto-disconnect Bluetooth\n- ANC control (Off/Noise Cancel/Transparency/Adaptive)\n- Find My Buds with GPS\n- Gesture customization\n\n### Install\nDownload APK, enable 'Install from unknown sources', then install."
          gh release create "$VERSION" \
            --title "AirPods Controller $VERSION" \
            --notes "$NOTES" \
            "$APK#AirPodsController-debug.apk"
