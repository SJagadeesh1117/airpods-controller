name: Build APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.1.1-bin.zip -d /tmp
          echo "/tmp/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        id: build
        run: |
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Post error as commit comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build.log', 'utf8');
            const lines = log.split('\n');
            const errorLines = lines.filter(l =>
              /FAILURE|error:|Caused by:|> Task|what went wrong|Could not/.test(l)
            ).slice(0, 40).join('\n');
            const last30 = lines.slice(-30).join('\n');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '## Build Error\n```\n' + errorLines + '\n```\n### Last 30 lines\n```\n' + last30 + '\n```'
            });

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsController-debug
          path: app/build/outputs/apk/debug/*.apk
