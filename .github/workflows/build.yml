name: Build APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.1.1-bin.zip -d /tmp
          /tmp/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsController-release
          path: app/build/outputs/apk/release/*.apk
