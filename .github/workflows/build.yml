name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Post error as commit comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          with open('/tmp/build.log') as f:
              lines = f.readlines()

          errors = [l.rstrip() for l in lines if any(x in l for x in
              ['FAILURE', 'error:', 'Caused by:', 'what went wrong', 'Could not', '> Task'])][:50]
          last30 = [l.rstrip() for l in lines[-30:]]

          body = (
              "## Build Error\n```\n" + "\n".join(errors) +
              "\n```\n### Last 30 lines\n```\n" + "\n".join(last30) + "\n```"
          )

          data = json.dumps({"body": body[:65000]}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/commits/{os.environ['SHA']}/comments",
              data=data,
              headers={
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              print("Comment posted:", r.status)
          PYEOF

      - name: Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, glob, urllib.request
          from datetime import datetime

          token = os.environ['GITHUB_TOKEN']
          repo  = os.environ['GITHUB_REPOSITORY']
          sha   = os.environ['GITHUB_SHA']
          version = "v1.0.0-" + datetime.utcnow().strftime("%Y%m%d%H%M%S")

          release_body = {
              "tag_name": version,
              "name": "AirPods Controller " + version,
              "body": (
                  "## AirPods Pro 2 Controller\n\n"
                  "Build from commit " + sha + "\n\n"
                  "### Features\n"
                  "- Battery status (L/R/Case) via BLE\n"
                  "- Ear detection + auto-pause audio\n"
                  "- Auto-disconnect Bluetooth on removal\n"
                  "- ANC control (Off/Noise Cancel/Transparency/Adaptive)\n"
                  "- Find My Buds with GPS + alarm sound\n"
                  "- Gesture customization\n\n"
                  "### Install\n"
                  "Download APK, enable 'Install from unknown sources', then install."
              ),
              "draft": False,
              "prerelease": False
          }

          req = urllib.request.Request(
              "https://api.github.com/repos/" + repo + "/releases",
              data=json.dumps(release_body).encode(),
              headers={
                  "Authorization": "token " + token,
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              release = json.loads(r.read())
          upload_url = release['upload_url'].split('{')[0]
          print("Release created:", release['html_url'])

          apk_files = glob.glob("app/build/outputs/apk/debug/*.apk")
          if not apk_files:
              raise FileNotFoundError("No APK found in app/build/outputs/apk/debug/")
          apk_path = apk_files[0]
          print("Uploading:", apk_path)
          with open(apk_path, 'rb') as f:
              apk_data = f.read()

          up_req = urllib.request.Request(
              upload_url + "?name=AirPodsController-debug.apk",
              data=apk_data,
              headers={
                  "Authorization": "token " + token,
                  "Content-Type": "application/vnd.android.package-archive",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(up_req) as r:
              print("APK uploaded, status:", r.status)
          PYEOF
