name: Build APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" || true

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.1.1-bin.zip -d /tmp
          echo "/tmp/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build Release APK
        run: |
          gradle assembleRelease --stacktrace --no-daemon 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "## Build Failure" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "FAILURE|error:|> Task|Exception|Could not|Caused by:|what went wrong" /tmp/build.log | head -40 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "### Last 30 lines" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 /tmp/build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $BUILD_EXIT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsController-release
          path: app/build/outputs/apk/release/*.apk
